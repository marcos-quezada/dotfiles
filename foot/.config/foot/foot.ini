# foot terminal configuration
# full option reference: man foot.ini(5)

[main]
font=Spleen 8x16:size=14:antialias=false, Symbols Nerd Font Mono:size=12
pad=25x25

[cursor]
style=block
blink=yes

[colors]
alpha=0.85

# gameboy DMG 4-shade palette — background is lightest green, foreground darkest
background=9bbc0f
foreground=0f380f

# all 16 slots mapped to the 4 DMG shades
regular0=0f380f  # black
regular1=8b530f  # red (warm accent, outside pure DMG but needed for git/diff)
regular2=306230  # green
regular3=8bac0f  # yellow
regular4=306230  # blue
regular5=306230  # magenta
regular6=8bac0f  # cyan
regular7=9bbc0f  # white

bright0=0f380f
bright1=8b530f
bright2=306230
bright3=8bac0f
bright4=306230
bright5=306230
bright6=8bac0f
bright7=9bbc0f

cursor=9bbc0f 0f380f

[csd]
color=ffadb9ca

# vim: ft=dosini
