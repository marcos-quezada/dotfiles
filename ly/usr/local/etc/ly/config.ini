# ly display manager config — /usr/local/etc/ly/config.ini
# full option reference: man ly(1) or /usr/local/share/doc/ly/README.md
#
# stowed via: doas stow --dir=~/dotfiles --target=/ --restow ly
# all keys not listed here keep their compiled-in defaults.

[ly]

# ── locale ────────────────────────────────────────────────────────────────────
lang = de

# ── appearance ────────────────────────────────────────────────────────────────
# matrix rain on the login screen
animation = matrix
# large ASCII clock in English
bigclock = en
# enable 24-bit colour in the TUI
full_color = true
# matrix rain colour — green
cmatrix_fg = 0x0000FF00
# matrix head character — bold white (0x01 = TB_BOLD flag)
cmatrix_head_col = 0x01FFFFFF

# ── hardware ──────────────────────────────────────────────────────────────────
# battery percentage shown top-left; BAT0 is the ACPI battery node name
battery_id = BAT0

# ── brightness ────────────────────────────────────────────────────────────────
# backlight(8) is in FreeBSD base; acpi_video_load="YES" must be in loader.conf
brightness_down_cmd = /usr/bin/backlight -q - 10%
brightness_up_cmd   = /usr/bin/backlight -q + 10%

# ── input ─────────────────────────────────────────────────────────────────────
# standard keybindings (not vi)
vi_mode = false

# ── power keys ────────────────────────────────────────────────────────────────
# F1 / F2 on the login screen
shutdown_key = F1
restart_key  = F2

# ── session persistence ───────────────────────────────────────────────────────
# remember last-used session and username across reboots
save = true

# ── session discovery ─────────────────────────────────────────────────────────
# where ly looks for .desktop session files; picks up sway automatically
waylandsessions = /usr/local/share/wayland-sessions
