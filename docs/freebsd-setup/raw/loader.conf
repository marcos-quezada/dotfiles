kern.geom.label.disk_ident.enable="0"
kern.geom.label.gptid.enable="0"
zfs_load="YES"
hw.nvidiadrm.modeset=1
teken.fg_color="10"
teken.bg_color="8"
screen.font=12x22
efi_max_resolution="1080p"
kern.vt.fb.default_mode="1920x1080"

hw.pci.do_power_nodriver="3"
hw.snd.latency="5"
hint.p4tcc.0.disabled="1"
hint.acpi_throttle.0.disabled="1"
hint.ahcich.0.pm_level="3"
hint.ahcich.1.pm_level="3"
hint.ahcich.2.pm_level="3"
hint.ahcich.3.pm_level="3"
hint.ahcich.4.pm_level="3"
hint.ahcich.5.pm_level="3"

drm.i915.firmware_path="/boot/firmware"
drm.i915.enable_rc6="1"
drm.i915.semaphores="1"
drm.i915.intel_iommu_enabled="0"

autoboot_delay="2"

# network
devmatch_blocklist="if_iwm iwm3168fw"
hw.iwlwifi.uapsd_disable=1
hw.iwlwifi.power_save=0

# these values need to be bumped up a bit for desktop usage
kern.maxproc="100000"
kern.ipc.shmseg="1024"
kern.ipc.shmmni="1024"

# enable the nub and the touchpad
hw.psm.trackpoint_support="1"
hw.psm.synaptics_support="1"

# increase the network interface queue link
net.link.ifqmaxlen="2048"

# enable hardware accelerated AES (can speed up TLS)
aesni_load="YES"

# Load the H-TCP algorithm. It has a more aggressive ramp-up to max
# bandwidth, and is optimized for high-speed, high-latency connections.
cc_htcp_load="YES"

# enable CPU firmware updates
cpuctl_load="YES"

# enable CPU temperature monitoring
coretemp_load="YES"

# enable LCD backlight control, ThinkPad buttons, etc
# acpi_ibm_load="YES"
acpi_video_load="YES"
acpi_wmi_load="YES"

# filesystems, webcam driver, sound etc
snd_hda_load="YES":
cuse4bsd_load="YES"
fuse_load="YES"
libiconv_load="YES"
cd9660_iconv_load="YES"
msdosfs_iconv_load="YES"
tmpfs_load="YES"

