# .tmux.conf

# ── prefix ────────────────────────────────────────────────────────────────────
# use C-a (screen-style); keep C-b as secondary so muscle memory works either way
set -g prefix C-a
bind C-a send-prefix

# ── terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
# tell tmux the outer terminal supports true colour
set -ag terminal-overrides ",xterm-256color:RGB"

# ── behaviour ─────────────────────────────────────────────────────────────────
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on    # close window 2 of 3 → window 3 becomes 2
set -g history-limit 10000
set -sg escape-time 10        # no noticeable lag for ESC in vim
set -g focus-events on        # let vim know when the pane gains focus

# ── mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── splits ────────────────────────────────────────────────────────────────────
# mnemonic: | is vertical bar → vertical split; - looks like a horizontal split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# new windows open in the same directory
bind c new-window -c "#{pane_current_path}"

# ── pane navigation ───────────────────────────────────────────────────────────
# vim-style movement without the prefix key held
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── copy mode ─────────────────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour250"
set -g status-left  "#[fg=colour2,bold] #S "
set -g status-right "#[fg=colour244] %H:%M  %d %b "
set -g status-left-length  30
set -g status-right-length 30

set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[fg=colour255,bold,bg=colour238] #I:#W "

# ── pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour2"

# ── reload ────────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "config reloaded"
